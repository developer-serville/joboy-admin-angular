<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4 py-12 relative overflow-hidden font-sans">

    <div class="absolute top-20 left-20 w-96 h-96 bg-blue-100 rounded-full blur-3xl opacity-30"></div>

    <div class="absolute bottom-20 right-20 w-96 h-96 bg-indigo-100 rounded-full blur-3xl opacity-30"></div>

    <div class="relative w-full max-w-md space-y-6 z-10">

        <div class="text-center flex flex-col items-center">

            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm mb-4">
                <img src="assets/logo/joboy-logo.png" alt="Joboy" class="h-14">
            </div>

            <h1 class="font-display text-3xl font-bold tracking-tight text-slate-900">
                Admin Console
            </h1>

            <p class="font-display mt-2 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                PLATFORM SERVICE BOOKING ADMINISTRATION
            </p>

        </div>

        <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-8">

            @if(error){

            <div class="mb-5 p-3 rounded-xl border border-red-100 bg-red-50">

                <p class="text-xs text-red-700 font-medium">
                    {{ error }}
                </p>

            </div>

            }

            <form [formGroup]="loginForm" (ngSubmit)="login()" class="space-y-5">

                <div>

                    <label
                        class="font-display block text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2">
                        Admin Account
                    </label>

                    <div class="relative">

                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">
                            ✉
                        </span>

                        <input type="text" formControlName="username" placeholder="george.jacob@serville.in"
                            class="font-display w-full h-14 pl-12 pr-4 text-sm font-medium rounded-lg border border-slate-200 bg-slate-50 hover:border-slate-300 focus:bg-white focus:border-blue-500 outline-none transition-all">

                    </div>

                </div>

                <div>

                    <div class="flex justify-between mb-2">

                        <label class="font-display text-[10px] font-bold uppercase tracking-widest text-slate-500">
                            Security Password
                        </label>

                        <span class="font-display text-xs font-medium text-blue-600 cursor-pointer hover:text-blue-800"
                            (click)="openForgot()">

                            Forgot Password?

                        </span>

                    </div>

                    <div class="relative">

                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">
                            🔒
                        </span>

                        <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
                            placeholder="••••••••"
                            class="font-display w-full h-14 pl-12 pr-12 text-sm font-medium rounded-lg border border-slate-200 bg-slate-50 hover:border-slate-300 focus:bg-white focus:border-blue-500 outline-none transition-all">

                        <button type="button" (click)="togglePassword()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">

                            <span class="material-icons text-xl">
                                {{ showPassword ? 'visibility_off' : 'visibility' }}
                            </span>

                        </button>

                    </div>

                </div>

                <button type="submit" [disabled]="loading"
                    class="font-display w-full py-3 rounded-md bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold shadow-sm transition">

                    {{
                    loading
                    ? 'Authenticating Staff...'
                    : 'Sign In as System Admin'
                    }}

                </button>

            </form>

            <!-- Footer -->
            <!-- <div class="mt-6 pt-5 border-t border-dashed border-slate-100 text-center">

                <p class="text-xs text-slate-400 font-semibold">
                    Sandbox Preview quick access:
                </p>

                <button (click)="autofill()"
                    class="mt-3 w-full py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-md text-xs font-semibold transition">

                    One-Click Autofill Credentials

                </button>

            </div> -->

        </div>

        <p class="font-display text-center text-xs text-slate-400">
            Joboy Home Services Tech Admin Platform · Secure AES-256 Vault
        </p>

    </div>

</div>
