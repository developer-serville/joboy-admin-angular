<div class="p-6 w-full max-w-[500px] box-border">
    <div class="flex items-start justify-between mb-6 pb-4 border-b border-slate-200">

        <div class="flex items-center gap-4">

            <div class="h-12 w-12 rounded-xl flex items-center justify-center" [ngClass]="{
                'bg-blue-100': data.action !== 'assign',
                'bg-orange-100': data.action === 'assign'
            }">

                <mat-icon class="!text-[26px]" [ngClass]="{
                    'text-blue-600': data.action !== 'assign',
                    'text-orange-600': data.action === 'assign'
                }">

                    {{ data.action === 'assign' ? 'person_add' : 'verified' }}

                </mat-icon>

            </div>

            <div>

                <h2 class="font-display text-xl font-semibold text-slate-800">
                    {{ data.action === 'assign'
                    ? 'Assign Booking'
                    : 'Confirm Booking' }}
                </h2>

                <p class="font-display text-sm text-slate-500 mt-1">
                    Booking #{{ data.order.order_no }}
                </p>

            </div>

        </div>

        <button type="button" (click)="dialogRef.close()" class="h-10 w-10
               flex items-center justify-center
               rounded-full
               text-slate-500
               hover:bg-slate-100
               hover:text-slate-700
               transition-all duration-200">

            <mat-icon class="!text-[20px]">
                close
            </mat-icon>

        </button>

    </div>


    <div *ngIf="data.action === 'assign'" class="mb-5">

        <label class="font-display font-semibold mb-2 block">

            Select Service Provider

        </label>

        <select [(ngModel)]="selectedProvider" class="font-display
           w-full
           h-12
           rounded-xl
           border
           border-slate-300
           bg-white
           px-4
           text-[14px]
           font-normal
           text-slate-700
           transition-all
           duration-200
           focus:outline-none
           focus:border-blue-500
           focus:ring-2
           focus:ring-blue-200">

            <option [ngValue]="null">

                Choose Provider

            </option>

            <option *ngFor="let provider of providers" [ngValue]="provider.sp_id">

                {{ provider.display_name }}

            </option>

        </select>

    </div>


    <div class="mb-6">

        <label class="font-display text-[14px] font-medium text-slate-700 mb-2 block">

            {{ data.action === 'assign'
            ? 'Assignment Note'
            : 'Confirmation Comment' }}

        </label>

        <textarea rows="5" [(ngModel)]="confirmReason" class="font-display
           w-full
           rounded-xl
           border
           border-slate-300
           p-4
           text-[14px]
           font-normal
           text-slate-700
           resize-none
           transition-all
           duration-200
           focus:outline-none
           focus:border-blue-500
           focus:ring-2
           focus:ring-blue-200" [placeholder]="
        data.action === 'assign'
            ? 'Enter assignment note...'
            : 'Enter confirmation comment...'
    ">
</textarea>

    </div>


    <div class="flex justify-end gap-3">

        <button type="button" (click)="dialogRef.close()" class="font-display
                   h-11
                   px-6
                   rounded-xl
                   border
                   border-slate-300
                   bg-white
                   text-slate-700
                   font-semibold
                   hover:bg-slate-100
                   transition">

            Cancel

        </button>

        <button type="button" (click)="save()" [disabled]="
                data.action === 'assign'
                    ? (!selectedProvider || !confirmReason.trim())
                    : !confirmReason.trim()
            " class="font-display
                   h-11
                   px-7
                   rounded-xl
                   text-white
                   font-semibold
                   shadow-md
                   transition-all
                   disabled:opacity-50
                   disabled:cursor-not-allowed" [ngClass]="{
                'bg-blue-600 hover:bg-blue-700': data.action !== 'assign',
                'bg-blue-500 hover:bg-blue-600': data.action === 'assign'
            }">

            <div class="flex items-center gap-2">

                <mat-icon>

                    {{ data.action === 'assign'
                    ? 'person_add'
                    : 'check_circle' }}

                </mat-icon>

                {{ data.action === 'assign'
                ? 'Assign Provider'
                : 'Confirm Booking' }}

            </div>

        </button>

    </div>

</div>
